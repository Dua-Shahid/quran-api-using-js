      <script>
        function loadsurah(){
            fetch(`https://api.alquran.cloud/v1/surah`)
          .then((res) => res.json())
          .then(result => {
            console.log(result.data);
            for(let i in result.data){
                let p = document.createElement("option");
                p.innerHTML = result.data[i].name;
                p.style.fontSize = "2rem";
                p.value = result.data[i].number;

                document.getElementById("main").appendChild(p);
            }
          })
        }

        function getsurahId(surahId){
        document.getElementById("surah").innerHTML = "";
        fetch(`https://api.alquran.cloud/v1/surah/`+ surahId.value)
          .then((res) => res.json())
          .then(result => {
            let  ayat = result.data.ayahs;
            for(let i in ayat){
                let p = document.createElement("p");
                p.innerHTML = ayat[i].text;
                p.style.fontSize = "2rem";
                p.style.borderBottom= "1px solid white";
                document.getElementById("surah").appendChild(p);
            }           
          })
        }
      </script>
       <select class="form-select form-select-lg mb-3 text-center" aria-label=".form-select-lg example" id="main" onchange="getsurahId(this)"></select>
       <div id="surah" class="ayat text-white text-center  border border-white border-2 rounded"></div>
